<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载远程 JSON 文件</title>
</head>
<body>
    <h1>下载远程 JSON 文件</h1>
    <button id="downloadBtn">下载 JSON 文件</button>

    <script>
        // JSON 文件链接
        const jsonFileUrl = "https://trigramser.github.io/VScodeTheme/monokai-color-theme.json"; // 替换为实际的链接

        // 按钮点击事件
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            try {
                // 使用 fetch 获取远程 JSON 数据
                const response = await fetch(jsonFileUrl);

                // 检查响应是否成功
                if (!response.ok) {
                    throw new Error(`HTTP 错误！状态码: ${response.status}`);
                }

                // 将响应解析为 JSON
                const jsonData = await response.json();

                // 将 JSON 对象转换为字符串
                const jsonString = JSON.stringify(jsonData, null, 2);

                // 创建 Blob 对象
                const blob = new Blob([jsonString], { type: "application/json" });

                // 创建下载链接
                const url = URL.createObjectURL(blob);

                // 创建一个临时的 <a> 元素
                const a = document.createElement('a');
                a.href = url;
                a.download = "data.json"; // 下载的文件名
                document.body.appendChild(a);

                // 自动触发点击事件
                a.click();

                // 移除临时元素并释放 URL
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error("获取或下载 JSON 文件时出错：", error);
                alert("下载失败，请检查链接是否有效！");
            }
        });
    </script>
</body>
</html>
