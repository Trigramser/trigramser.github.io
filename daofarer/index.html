<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>道行天涯 ARPG 设计文档</title>

  <style>
    :root {
      --bg: #0b0f12;
      --paper: rgba(255, 255, 255, 0.055);
      --paper-strong: rgba(255, 255, 255, 0.085);
      --text: #f6f0df;
      --muted: #a8b0a5;
      --line: rgba(246, 240, 223, 0.14);
      --gold: #d6a84f;
      --jade: #2dd4bf;
      --blue: #60a5fa;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --radius: 20px;
      --max: 1080px;
      --sidebar-width: 320px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(214, 168, 79, 0.22), transparent 32rem),
        radial-gradient(circle at 90% 10%, rgba(45, 212, 191, 0.12), transparent 30rem),
        linear-gradient(180deg, #0b0f12, #070a0c);
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Microsoft YaHei",
        sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .container {
      width: min(100% - 40px, var(--max));
      margin: 0 auto;
    }

    .desktop-shell {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      min-height: 100vh;
    }

    .desktop-sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 26px 20px;
      border-right: 1px solid var(--line);
      background: rgba(5, 8, 9, 0.84);
      backdrop-filter: blur(20px);
    }

    .main-content {
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      margin-bottom: 24px;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid rgba(214, 168, 79, 0.38);
      border-radius: 15px;
      color: var(--gold);
      background:
        radial-gradient(circle, rgba(214, 168, 79, 0.26), transparent 68%),
        rgba(255, 255, 255, 0.04);
      font-size: 24px;
      box-shadow: 0 0 28px rgba(214, 168, 79, 0.16);
    }

    .brand-title {
      margin: 0;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: -0.04em;
    }

    .brand-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .progress-card {
      margin-bottom: 24px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--jade));
      transition: width 260ms ease;
    }

    .side-title {
      margin: 24px 0 10px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .desktop-toc {
      display: grid;
      gap: 6px;
    }

    .desktop-toc a {
      display: block;
      padding: 10px 12px;
      border-radius: 12px;
      color: #d8d0bd;
      font-size: 14px;
      line-height: 1.35;
    }

    .desktop-toc a:hover,
    .desktop-toc a.active {
      color: var(--text);
      background: rgba(214, 168, 79, 0.13);
    }

    .mobile-header {
      display: none;
    }

    .mobile-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
    }

    .mobile-brand strong {
      display: block;
      font-size: 16px;
      line-height: 1.25;
    }

    .mobile-brand small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .mobile-toc {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 14px;
      scrollbar-width: none;
    }

    .mobile-toc::-webkit-scrollbar {
      display: none;
    }

    .mobile-toc a {
      flex: 0 0 auto;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #eadfc7;
      background: rgba(255, 255, 255, 0.045);
      font-size: 13px;
      white-space: nowrap;
    }

    .mobile-toc a.active {
      color: #111;
      border-color: transparent;
      background: linear-gradient(135deg, var(--gold), var(--jade));
    }

    .hero {
      padding: 72px 0 42px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--jade);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .hero h1 {
      max-width: 1000px;
      margin: 0 0 20px;
      font-size: clamp(42px, 7vw, 84px);
      line-height: 0.95;
      letter-spacing: -0.08em;
    }

    .hero-desc {
      max-width: 900px;
      margin: 0 0 28px;
      color: #e8ddc7;
      font-size: clamp(18px, 2.2vw, 23px);
      line-height: 1.75;
    }

    .meta-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meta-pill {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #efe2c5;
      background: rgba(255, 255, 255, 0.045);
      font-size: 13px;
    }

    .toolbar-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(11, 15, 18, 0.86);
      backdrop-filter: blur(18px);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
    }

    .search {
      flex: 1;
      min-width: 0;
      height: 46px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
    }

    .search:focus {
      border-color: var(--jade);
    }

    .filter-btn {
      height: 46px;
      padding: 0 15px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-btn.active {
      border-color: rgba(245, 158, 11, 0.7);
      background: rgba(245, 158, 11, 0.14);
      color: #fcd34d;
    }

    .document {
      padding: 42px 0 42px;
    }

    .chapter {
      margin-bottom: 58px;
      scroll-margin-top: 92px;
    }

    .chapter-head {
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .chapter-index {
      color: var(--gold);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .chapter h2 {
      margin: 8px 0 12px;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
      letter-spacing: -0.065em;
    }

    .chapter-description {
      max-width: 900px;
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .section-list {
      display: grid;
      gap: 20px;
    }

    .doc-section {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.16);
    }

    .section-head {
      padding: 21px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.035);
    }

    .section-head h3 {
      margin: 0 0 7px;
      font-size: 23px;
      letter-spacing: -0.035em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .field-row {
      padding: 20px 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.075);
    }

    .field-row:first-child {
      border-top: 0;
    }

    .field-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .field-label {
      color: #f0e5cc;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.35;
    }

    .field-guide {
      max-width: 720px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .status {
      flex: 0 0 auto;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .status.todo {
      color: #fde68a;
      background: rgba(245, 158, 11, 0.16);
    }

    .status.draft {
      color: #bfdbfe;
      background: rgba(96, 165, 250, 0.16);
    }

    .status.done {
      color: #bbf7d0;
      background: rgba(34, 197, 94, 0.16);
    }

    .field-content {
      color: #d6cbb7;
      line-height: 1.95;
      white-space: pre-line;
    }

    .field-row.todo .field-content {
      color: #8f998d;
      font-style: italic;
    }

    .empty-state {
      padding: 28px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
    }

    .relation-section {
      padding: 0 0 92px;
    }

    .relation-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .relation-tab {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #eadfc7;
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
    }

    .relation-tab.active {
      color: #111;
      border-color: transparent;
      background: linear-gradient(135deg, var(--gold), var(--jade));
    }

    .relation-view {
      display: grid;
      gap: 18px;
    }

    .relation-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .relation-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .relation-card,
    .relation-table-card,
    .chain-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      overflow: hidden;
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.16);
    }

    .relation-card {
      padding: 20px;
    }

    .relation-card h3,
    .relation-table-card h3,
    .chain-card h3 {
      margin: 0 0 10px;
      color: #f0e5cc;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .relation-card p,
    .chain-card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.75;
    }

    .relation-mini-title {
      margin: 16px 0 8px;
      color: var(--jade);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .relation-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .relation-tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      color: #dce8df;
      background: rgba(255, 255, 255, 0.07);
      font-size: 12px;
      line-height: 1;
    }

    .relation-tag.gold {
      color: #fde68a;
      background: rgba(214, 168, 79, 0.14);
    }

    .relation-tag.green {
      color: #bbf7d0;
      background: rgba(34, 197, 94, 0.14);
    }

    .relation-tag.red {
      color: #fecaca;
      background: rgba(239, 68, 68, 0.14);
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .relation-table-card h3 {
      padding: 20px 20px 0;
    }

    .relation-table-card > p {
      padding: 0 20px;
      color: var(--muted);
      line-height: 1.7;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 13px 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
      vertical-align: top;
      line-height: 1.6;
    }

    th {
      color: #f0e5cc;
      background: rgba(255, 255, 255, 0.04);
      font-size: 13px;
    }

    td {
      color: #d6cbb7;
      font-size: 14px;
    }

    .chain-card {
      padding: 20px;
    }

    .chain-flow {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .chain-step {
      position: relative;
      padding: 14px 16px;
      border: 1px solid rgba(246, 240, 223, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
      color: #d6cbb7;
      line-height: 1.7;
    }

    .chain-step::after {
      content: "↓";
      display: block;
      margin-top: 8px;
      color: var(--gold);
      font-weight: 900;
    }

    .chain-step:last-child::after {
      content: "";
      display: none;
    }

    .rule-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.045);
    }

    .rule-card h4 {
      margin: 0 0 10px;
      color: #f0e5cc;
      font-size: 17px;
    }

    .rule-line {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      color: #d6cbb7;
      line-height: 1.65;
      font-size: 14px;
    }

    .rule-line:first-of-type {
      border-top: 0;
    }

    .rule-line strong {
      color: var(--muted);
      font-weight: 800;
    }

    .footer {
      padding: 32px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1000px) {
      .relation-grid,
      .relation-grid.three {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .mobile-header {
        position: sticky;
        top: 0;
        z-index: 50;
        display: block;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 8, 9, 0.9);
        backdrop-filter: blur(18px);
      }

      .desktop-shell {
        display: block;
      }

      .desktop-sidebar {
        display: none;
      }

      .toolbar-wrap {
        top: 102px;
      }

      .hero {
        padding-top: 42px;
      }

      .chapter {
        scroll-margin-top: 168px;
      }
    }

    @media (max-width: 640px) {
      .container {
        width: min(100% - 28px, var(--max));
      }

      .hero {
        padding-top: 34px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .search,
      .filter-btn {
        width: 100%;
      }

      .toolbar-wrap {
        top: 101px;
      }

      .field-top {
        flex-direction: column;
      }

      .status {
        order: -1;
      }

      .section-head,
      .field-row {
        padding: 18px;
      }

      .relation-card,
      .chain-card {
        padding: 18px;
      }

      .rule-line {
        grid-template-columns: 1fr;
        gap: 2px;
      }
    }
  </style>
</head>

<body>
  <header class="mobile-header">
    <a class="mobile-brand" href="#top">
      <span class="brand-mark">☯</span>
      <span>
        <strong id="mobileProjectName">道行天涯 ARPG</strong>
        <small id="mobileProjectSubtitle">降妖除魔 · 多路线任务</small>
      </span>
    </a>

    <nav class="mobile-toc" id="mobileToc"></nav>
  </header>

  <div class="desktop-shell">
    <aside class="desktop-sidebar">
      <a class="brand" href="#top">
        <div class="brand-mark">☯</div>
        <div>
          <p class="brand-title" id="projectName">道行天涯 ARPG</p>
          <p class="brand-subtitle" id="projectSubtitle">单机 / 降妖除魔 / 多路线任务 / 因果声望</p>
        </div>
      </a>

      <div class="progress-card">
        <div class="progress-top">
          <span>文档完成度</span>
          <strong id="progressText">0%</strong>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <p class="side-title">目录</p>
      <nav class="desktop-toc" id="desktopToc"></nav>
    </aside>

    <main class="main-content" id="top">
      <section class="hero">
        <div class="container">
          <p class="eyebrow">Game Design Document</p>
          <h1 id="heroTitle">道行天涯 ARPG 设计文档</h1>
          <p class="hero-desc" id="heroDesc"></p>
          <div class="meta-grid" id="metaGrid"></div>
        </div>
      </section>

      <div class="toolbar-wrap">
        <div class="container toolbar">
          <input class="search" id="searchInput" type="search" placeholder="搜索文档：因果、NPC、任务、妖魔、道术、声望..." />
          <button class="filter-btn" id="todoOnlyBtn">只看待补充</button>
        </div>
      </div>

      <section class="document" id="document">
        <div class="container" id="documentInner"></div>
      </section>

      <section class="relation-section chapter" id="chapter-relation-map" data-chapter="relation-map">
        <div class="container">
          <div class="chapter-head">
            <div class="chapter-index">Chapter 17</div>
            <h2>关系图谱与影响矩阵</h2>
            <p class="chapter-description">
              这里专门整理“玩家行为 → 声望变化 → NPC 态度变化 → 任务分支变化 → 主线 / 结局变化”的复杂关系。
              普通章节负责写设定，这里负责管理影响规则，避免后期内容散乱。
            </p>
          </div>

          <div class="relation-tabs" id="relationTabs"></div>
          <div class="relation-view" id="relationView"></div>
        </div>
      </section>

      <footer class="footer">
        <div class="container">
          <p id="footerText"></p>
        </div>
      </footer>
    </main>
  </div>

  <script>
    const GAME_DOCUMENT = {
      project: {
        name: "道行天涯 ARPG",
        subtitle: "中国古代道教背景 · 降妖除魔 · 多路线单机 ARPG",
        title: "道行天涯 ARPG 设计文档",
        description: "这是一款以中国古代道教文化为世界观基础的单机 ARPG。玩家扮演一名行走人间的修道者，在妖邪横行、官府腐败、民间信仰混杂的时代中降妖除魔、匡扶正义。游戏重点不是单一路线通关，而是让玩家通过战斗、交涉、调查、欺骗、威慑、度化等多种方式解决问题，并让每一步行为影响 NPC、村镇、门派与妖魔势力对玩家的态度。",
        meta: [
          "类型：单机 ARPG",
          "背景：中国古代道教 / 志怪 / 民间传说",
          "核心参考：Fallout 2 式多路线任务结构",
          "核心关键词：降妖除魔、因果声望、NPC 态度、多结局",
          "当前阶段：世界观与系统框架搭建"
        ],
        lastUpdated: "2026-05-22"
      },

      chapters: [
        {
          id: "overview",
          index: "01",
          title: "项目总览",
          description: "定义游戏最基本的身份：它是什么、玩家扮演谁、世界发生了什么、核心卖点是什么。",
          sections: [
            {
              title: "游戏一句话概念",
              description: "用最短的话说明这个游戏的核心吸引力。",
              fields: [
                {
                  label: "一句话 Pitch",
                  guide: "建议控制在 50 字以内。",
                  status: "draft",
                  value: "一名道门弟子行走乱世，通过降妖、调查、交涉与抉择改变人间与妖界秩序。"
                },
                {
                  label: "玩家身份",
                  guide: "玩家到底是谁？道士、散修、门派弟子、被逐出师门的人？",
                  status: "todo",
                  value: ""
                },
                {
                  label: "核心卖点",

    function initializeApp() {
      validateDocumentData();

      renderProject();
      renderToc();
      renderDocument();
      renderProgress();
      renderRelationTabs();
      renderRelationView();
      bindEvents();
      observeActiveChapter();
    }

    function bindEvents() {
      elements.searchInput.addEventListener("input", (event) => {
        state.searchText = event.target.value.trim().toLowerCase();
        renderDocument();
        observeActiveChapter();
      });

      elements.todoOnlyBtn.addEventListener("click", () => {
        state.todoOnly = !state.todoOnly;
        elements.todoOnlyBtn.classList.toggle("active", state.todoOnly);
        renderDocument();
        observeActiveChapter();
      });

      elements.relationTabs.addEventListener("click", (event) => {
        const button = event.target.closest("[data-relation-view]");

        if (!button) {
          return;
        }

        state.relationView = button.dataset.relationView;
        renderRelationTabs();
        renderRelationView();
      });
    }

    function validateDocumentData() {
      const warnings = [];
      const chapterIds = new Map();
      const chapterIndexes = new Map();

      GAME_DOCUMENT.chapters.forEach((chapter) => {
        const chapterName = `${chapter.index} · ${chapter.title}`;

        if (!/^[a-z0-9-]+$/.test(chapter.id)) {
          warnings.push(`章节 id 不规范：${chapterName}，当前 id 是 "${chapter.id}"。建议只用小写英文、数字和短横线。`);
        }

        if (chapterIds.has(chapter.id)) {
          warnings.push(`章节 id 重复：${chapter.id}，出现在 "${chapterIds.get(chapter.id)}" 和 "${chapterName}"。`);
        } else {
          chapterIds.set(chapter.id, chapterName);
        }

        if (chapterIndexes.has(chapter.index)) {
          warnings.push(`章节编号重复：Chapter ${chapter.index}，出现在 "${chapterIndexes.get(chapter.index)}" 和 "${chapterName}"。`);
        } else {
          chapterIndexes.set(chapter.index, chapterName);
        }

        chapter.sections.forEach((section, sectionPosition) => {
          if (!section.title || !section.title.trim()) {
            warnings.push(`空 section 标题：${chapterName} 的第 ${sectionPosition + 1} 个 section。`);
          }

          section.fields.forEach((field, fieldPosition) => {
            const fieldPath = `${chapterName} > ${section.title || "未命名 section"} > 第 ${fieldPosition + 1} 个字段`;

            if (!field.label || !field.label.trim()) {
              warnings.push(`字段 label 为空：${fieldPath}。`);
            }

            if (field.status === "todo" && String(field.value || "").trim() !== "") {
              warnings.push(`字段已有内容但 status 仍是 todo：${fieldPath}。建议改成 draft。`);
            }

            if (field.status === "draft" && String(field.value || "").trim() === "") {
              warnings.push(`字段是 draft 但 value 为空：${fieldPath}。建议改成 todo。`);
            }
          });
        });
      });

      if (warnings.length > 0) {
        console.group("道行天涯文档数据检查");
        warnings.forEach((warning) => console.warn(warning));
        console.groupEnd();
      }
    }

    function renderProject() {
      const project = GAME_DOCUMENT.project;

      document.title = project.title;

      elements.projectName.textContent = project.name;
      elements.projectSubtitle.textContent = project.subtitle;
      elements.mobileProjectName.textContent = project.name;
      elements.mobileProjectSubtitle.textContent = project.subtitle;
      elements.heroTitle.textContent = project.title;
      elements.heroDesc.textContent = project.description;
      elements.footerText.textContent = `${project.name} · Last Updated ${project.lastUpdated}`;

      elements.metaGrid.innerHTML = project.meta
        .map((item) => `<span class="meta-pill">${escapeHtml(item)}</span>`)
        .join("");
    }

    function getTocItems() {
      return [
        ...GAME_DOCUMENT.chapters.map((chapter) => ({
          id: chapter.id,
          index: chapter.index,
          title: chapter.title
        })),
        {
          id: "relation-map",
          index: "17",
          title: "关系图谱与影响矩阵"
        }
      ];
    }

    function renderToc() {
      const tocItems = getTocItems();

      const desktopHtml = tocItems
        .map((item) => {
          return `
            <a href="#chapter-${escapeHtml(item.id)}" data-chapter-link="${escapeHtml(item.id)}">
              ${escapeHtml(item.index)} · ${escapeHtml(item.title)}
            </a>
          `;
        })
        .join("");

      const mobileHtml = tocItems
        .map((item) => {
          return `
            <a href="#chapter-${escapeHtml(item.id)}" data-chapter-link="${escapeHtml(item.id)}">
              ${escapeHtml(item.index)}
            </a>
          `;
        })
        .join("");

      elements.desktopToc.innerHTML = desktopHtml;
      elements.mobileToc.innerHTML = mobileHtml;
    }

    function renderDocument() {
      const html = GAME_DOCUMENT.chapters
        .map((chapter) => renderChapter(chapter))
        .filter(Boolean)
        .join("");

      elements.documentInner.innerHTML = html || `
        <div class="empty-state">
          没有找到匹配内容。可以换一个关键词，或关闭“只看待补充”。
        </div>
      `;
    }

    function renderChapter(chapter) {
      const renderedSections = chapter.sections
        .map((section) => renderSection(section))
        .filter(Boolean);

      if (renderedSections.length === 0) {
        return "";
      }

      return `
        <article class="chapter" id="chapter-${escapeHtml(chapter.id)}" data-chapter="${escapeHtml(chapter.id)}">
          <div class="chapter-head">
            <div class="chapter-index">Chapter ${escapeHtml(chapter.index)}</div>
            <h2>${escapeHtml(chapter.title)}</h2>
            <p class="chapter-description">${escapeHtml(chapter.description)}</p>
          </div>

          <div class="section-list">
            ${renderedSections.join("")}
          </div>
        </article>
      `;
    }

    function renderSection(section) {
      const renderedFields = section.fields
        .map((field) => renderField(field))
        .filter(Boolean);

      if (renderedFields.length === 0) {
        return "";
      }

      return `
        <section class="doc-section">
          <div class="section-head">
            <h3>${escapeHtml(section.title)}</h3>
            <p>${escapeHtml(section.description)}</p>
          </div>

          <div class="field-list">
            ${renderedFields.join("")}
          </div>
        </section>
      `;
    }

    function renderField(field) {
      const normalizedValue = String(field.value || "").trim();
      const isTodo = field.status === "todo" || normalizedValue === "";

      if (state.todoOnly && !isTodo) {
        return "";
      }

      const searchableText = [
        field.label,
        field.guide,
        field.status,
        field.value
      ].join(" ").toLowerCase();

      if (state.searchText && !searchableText.includes(state.searchText)) {
        return "";
      }

      const statusLabel = getStatusLabel(field.status, normalizedValue);
      const content = normalizedValue || "待补充。";

      return `
        <div class="field-row ${isTodo ? "todo" : ""}">
          <div class="field-top">
            <div class="field-label">${escapeHtml(field.label)}</div>
            <span class="status ${escapeHtml(statusLabel.className)}">${escapeHtml(statusLabel.text)}</span>
          </div>

          <div class="field-guide">${escapeHtml(field.guide)}</div>
          <div class="field-content">${escapeHtml(content)}</div>
        </div>
      `;
    }

    function getStatusLabel(status, value) {
      if (status === "done") {
        return {
          text: "已定稿",
          className: "done"
        };
      }

      if (status === "draft" && value.trim() !== "") {
        return {
          text: "草稿",
          className: "draft"
        };
      }

      return {
        text: "待补充",
        className: "todo"
      };
    }

    function renderProgress() {
      const fields = GAME_DOCUMENT.chapters.flatMap((chapter) => {
        return chapter.sections.flatMap((section) => section.fields);
      });

      const completed = fields.filter((field) => {
        return field.status !== "todo" && String(field.value || "").trim() !== "";
      });

      const percentage = fields.length === 0
        ? 0
        : Math.round((completed.length / fields.length) * 100);

      elements.progressText.textContent = `${percentage}%`;
      elements.progressBar.style.width = `${percentage}%`;
    }

        { id: "flags", label: "Flag 表" },
        { id: "chains", label: "因果链" },
        { id: "rules", label: "规则表" }
      ];

      elements.relationTabs.innerHTML = tabs
        .map((tab) => {
          const active = tab.id === state.relationView ? "active" : "";

          return `
            <button class="relation-tab ${active}" data-relation-view="${escapeHtml(tab.id)}">
              ${escapeHtml(tab.label)}
            </button>
          `;
        })
        .join("");
    }

    function renderRelationView() {
      if (state.relationView === "overview") {
        elements.relationView.innerHTML = renderRelationOverview();
        return;
      }

      if (state.relationView === "reputations") {
        elements.relationView.innerHTML = renderReputations();
        return;
      }

      if (state.relationView === "npcs") {
        elements.relationView.innerHTML = renderNpcs();
        return;
      }

      if (state.relationView === "quests") {
        elements.relationView.innerHTML = renderQuests();
        return;
      }

      if (state.relationView === "flags") {
        elements.relationView.innerHTML = renderFlags();
        return;
      }

      if (state.relationView === "chains") {
        elements.relationView.innerHTML = renderChains();
        return;
      }

      if (state.relationView === "rules") {
        elements.relationView.innerHTML = renderRules();
      }
    }

    function renderRelationOverview() {
      return `
        <div class="relation-grid three">
          <article class="relation-card">
            <h3>${RELATION_DATA.reputations.length}</h3>
            <p>声望 / 倾向维度</p>
            <div class="relation-tags">
              ${RELATION_DATA.reputations.map((item) => `<span class="relation-tag gold">${escapeHtml(item.name)}</span>`).join("")}
            </div>
          </article>

          <article class="relation-card">
            <h3>${RELATION_DATA.npcs.length}</h3>
            <p>受声望影响的重要 NPC</p>
            <div class="relation-tags">
              ${RELATION_DATA.npcs.map((item) => `<span class="relation-tag">${escapeHtml(item.name)}</span>`).join("")}
            </div>
          </article>

          <article class="relation-card">
            <h3>${RELATION_DATA.rules.length}</h3>
            <p>已定义影响规则</p>
            <div class="relation-tags">
              ${RELATION_DATA.flags.map((item) => `<span class="relation-tag green">${escapeHtml(item.name)}</span>`).join("")}
            </div>
          </article>
        </div>

        <article class="relation-table-card">
          <h3>核心影响公式</h3>
          <p>所有复杂关系都尽量按这个公式整理，避免信息散落在不同章节。</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>阶段</th>
                  <th>示例</th>
                  <th>网页中对应位置</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>玩家行为 / Flag</td>
                  <td>杀死狐妖、公开使用禁术、庇护妖物</td>
                  <td>Flag 表</td>
                </tr>
                <tr>
                  <td>声望变化</td>
                  <td>妖族关系 -20，道门威望 -10，因果污染 +20</td>
                  <td>声望维度</td>
                </tr>
                <tr>
                  <td>NPC 态度变化</td>
                  <td>狐族密探敌视、道观师叔责罚、村民躲避</td>
                  <td>NPC 态度</td>
                </tr>
                <tr>
                  <td>任务分支变化</td>
                  <td>白狐岭和平路线关闭，邪修路线开启</td>
                  <td>任务分支 / 规则表</td>
                </tr>
                <tr>
                  <td>长期后果</td>
                  <td>主线情报来源变化、结局评价变化</td>
                  <td>因果链</td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>
      `;
    }

    function renderReputations() {
      return `
        <div class="relation-grid">
          ${RELATION_DATA.reputations.map((rep) => {
            const affectedRules = RELATION_DATA.rules.filter((rule) => {
              return rule.source === rep.id || rule.target.includes(rep.id);
            });

            return `
              <article class="relation-card">
                <h3>${escapeHtml(rep.name)}</h3>
                <p>${escapeHtml(rep.description)}</p>

                <div class="relation-tags">
                  <span class="relation-tag gold">${escapeHtml(rep.type)}</span>
                  <span class="relation-tag">${escapeHtml(affectedRules.length)} 条规则关联</span>
                </div>

                <div class="relation-mini-title">等级效果</div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>范围</th>
                        <th>称号</th>
                        <th>效果</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${rep.levels.map((level) => {
                        return `
                          <tr>
                            <td>${escapeHtml(level.range)}</td>
                            <td>${escapeHtml(level.name)}</td>
                            <td>${escapeHtml(level.effect)}</td>
                          </tr>
                        `;
                      }).join("")}
                    </tbody>
                  </table>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderNpcs() {
      return `
        <div class="relation-grid">
          ${RELATION_DATA.npcs.map((npc) => {
            const npcRules = RELATION_DATA.rules.filter((rule) => {
              return rule.target === npc.id || rule.note.includes(npc.name);
            });

            return `
              <article class="relation-card">
                <h3>${escapeHtml(npc.name)}</h3>
                <p>${escapeHtml(npc.description)}</p>

                <div class="relation-tags">
                  <span class="relation-tag gold">${escapeHtml(npc.faction)}</span>
                  <span class="relation-tag">${escapeHtml(npcRules.length)} 条直接规则</span>
                </div>

                <div class="relation-mini-title">受这些声望 / Flag 影响</div>
                <div class="relation-tags">
                  ${npc.attitudeDependsOn.map((id) => `<span class="relation-tag">${escapeHtml(getEntityName(id))}</span>`).join("")}
                </div>

                <div class="relation-mini-title">关联任务</div>
                <div class="relation-tags">
                  ${npc.relatedQuests.map((id) => `<span class="relation-tag green">${escapeHtml(getEntityName(id))}</span>`).join("")}
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderQuests() {
      return `
        <div class="relation-view">
          ${RELATION_DATA.quests.map((quest) => {
            const questRules = RELATION_DATA.rules.filter((rule) => rule.affectedQuests.includes(quest.id));

            return `
              <article class="relation-table-card">
                <h3>${escapeHtml(quest.name)}</h3>
                <p>${escapeHtml(quest.chapter)} · ${escapeHtml(quest.description)}</p>

                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>路线</th>
                        <th>开启条件</th>
                        <th>关闭条件</th>
                        <th>直接结果</th>
                        <th>长期影响</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${quest.branches.map((branch) => {
                        return `
                          <tr>
                            <td>${escapeHtml(branch.name)}</td>
                            <td>${escapeHtml(branch.condition)}</td>
                            <td>${escapeHtml(branch.closeCondition)}</td>
                            <td>${escapeHtml(branch.result)}</td>
                            <td>${escapeHtml(branch.longTermImpact)}</td>
                          </tr>
                        `;
                      }).join("")}
                    </tbody>
                  </table>
                </div>

                <div style="padding: 18px 20px 20px;">
                  <div class="relation-mini-title">关联规则</div>
                  <div class="relation-tags">
                    ${questRules.length > 0
                      ? questRules.map((rule) => `<span class="relation-tag gold">${escapeHtml(rule.title)}</span>`).join("")
                      : `<span class="relation-tag">暂无直接规则</span>`
                    }
                  </div>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderFlags() {
      return `
        <div class="relation-grid">
          ${RELATION_DATA.flags.map((flag) => {
            return `
              <article class="relation-card">
                <h3>${escapeHtml(flag.name)}</h3>
                <p>${escapeHtml(flag.description)}</p>

                <div class="relation-tags">
                  <span class="relation-tag gold">来源：${escapeHtml(flag.source)}</span>
                  <span class="relation-tag">${escapeHtml(flag.id)}</span>
                </div>

                <div class="relation-mini-title">影响</div>
                <div class="relation-tags">
                  ${flag.impacts.map((impact) => `<span class="relation-tag green">${escapeHtml(impact)}</span>`).join("")}
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderChains() {
      return `
        <div class="relation-view">
          ${RELATION_DATA.chains.map((chain) => {
            return `
              <article class="chain-card">
                <h3>${escapeHtml(chain.title)}</h3>
                <p>${escapeHtml(chain.summary)}</p>

                <div class="chain-flow">
                  ${chain.steps.map((step) => `<div class="chain-step">${escapeHtml(step)}</div>`).join("")}
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderRules() {
      return `
        <div class="relation-grid">
          ${RELATION_DATA.rules.map((rule) => {
            return `
              <article class="rule-card">
                <h4>${escapeHtml(rule.title)}</h4>

                <div class="rule-line">
                  <strong>来源</strong>
                  <span>${escapeHtml(rule.sourceType)} · ${escapeHtml(getEntityName(rule.source))}</span>
                </div>

                <div class="rule-line">
                  <strong>条件</strong>
                  <span>${escapeHtml(rule.condition)}</span>
                </div>

                <div class="rule-line">
                  <strong>目标</strong>
                  <span>${escapeHtml(rule.targetType)} · ${escapeHtml(getEntityName(rule.target))}</span>
                </div>

                <div class="rule-line">
                  <strong>效果</strong>
                  <span>${escapeHtml(rule.effect)}</span>
                </div>

                <div class="rule-line">
                  <strong>影响任务</strong>
                  <span>${rule.affectedQuests.map((id) => escapeHtml(getEntityName(id))).join("，")}</span>
                </div>

                <div class="rule-line">
                  <strong>备注</strong>
                  <span>${escapeHtml(rule.note)}</span>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function getEntityName(id) {
      const allReputations = RELATION_DATA.reputations;
      const allNpcs = RELATION_DATA.npcs;
      const allQuests = RELATION_DATA.quests;
      const allFlags = RELATION_DATA.flags;
      const allBranches = RELATION_DATA.quests.flatMap((quest) => quest.branches);

      const found = [
        ...allReputations,
        ...allNpcs,
        ...allQuests,
        ...allFlags,
        ...allBranches
      ].find((item) => item.id === id);

      if (found) {
        return found.name;
      }

      const fallbackNames = {
        qingshi_reputation: "青石村声望",
        official_trust: "官府信任",
        village_npcs: "村镇 NPC 群体",
        dao_mainline: "道门主线",
        master_trial: "师门试炼",
        missing_girl: "失踪少女",
        village_shrine: "村祠异变",
        official_route: "官府路线",
        wanted_order: "通缉系统"
      };

      return fallbackNames[id] || id;
    }

    function observeActiveChapter() {
      if (state.observer) {
        state.observer.disconnect();
      }

      const getLinks = () => [...document.querySelectorAll("[data-chapter-link]")];

      state.observer = new IntersectionObserver(
        (entries) => {
          const visible = entries
            .filter((entry) => entry.isIntersecting)
            .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];

          if (!visible) {
            return;
          }

          const chapterId = visible.target.dataset.chapter;

          getLinks().forEach((link) => {
            link.classList.toggle("active", link.dataset.chapterLink === chapterId);
          });
        },
        {
          root: null,
          threshold: [0.16, 0.32, 0.5],
          rootMargin: "-18% 0px -58% 0px"
        }
      );

      document.querySelectorAll("[data-chapter]").forEach((chapter) => {
        state.observer.observe(chapter);
      });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
