<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #div-0 {
            width: 350px;
            display: flex;
            border: 1px solid #DCDCDC;
        }
        #div-0 label {
            flex: 1;
            background-color: #F5F5F5;
            font-family: "楷体 ";
            text-align: center;
        }
        #div-0 button {
            flex: 10px;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <div id="div-0">
        <label for="username">用户名：</label>
        <input type="text" id="username">
        <button>提交</button>
    </div>
</body>
</html>
