<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
<script>
    let i = 0
    let sum = 0
    while (i < 100) {
        if (i % 2 == 0) {
            sum += i
        }
        i++
    }
    document.write(`累加1~100中的偶数。结果是：${sum}<br>`)

    // continue
    // break
    // 这两个用法与之前学的都一样

    // for循环
    // 利用for循环输出三句话，月薪过百万
    for (let i = 1; i <= 3; i++) {
        document.write(`月薪过百万！<br>`)
    }


</script>
</html>
