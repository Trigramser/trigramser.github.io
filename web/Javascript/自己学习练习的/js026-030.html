<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
    <script>
        let score = 90
        if(score >= 90){
            console.log('优秀')
        }else if(score >= 80){
            console.log('良好')
        }else if(score >= 70){
            console.log('中等')
        }else if(score >= 60){
            console.log('及格')
        }else{
            console.log('不及格')
        }

        // 三元运算符
        // 条件 ?  满足条件执行的代码 : 不满足条件执行的代码
        let result = score >= 90 ? '优秀' : '良好'
        console.log(`result: ${result}`)

        // 补零
        let num = 5
        console.log(num.toString().padStart(2, '0'))

        // switch  语句
        // 找到跟小括号里数据全等的case值，并执行里面对应的代码
        // 若没有全等 === 的则执行default里的代码
        // 例：数据若跟值2全等，则执行代码2
        switch(score){
            case 90:
                console.log('优秀')
                break
            case 80:
                console.log('良好')
                break
            case 70:
                console.log('中等')
                break
            case 60:
                console.log('及格')
                break
            default:
                console.log('不及格')
        }
        
        // 断点调试

    </script>

</html>
