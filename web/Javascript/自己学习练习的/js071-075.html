<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <script>
        // 073 猜人名
        let arr = ['赵云', '关羽', '张飞', '马超', '黄忠', '刘备', '曹操']
        let randomI = Math.floor(Math.random() * arr.length)
        console.log(arr[randomI])
        document.write(arr, '<br/>')
        document.write(arr[randomI], '<br/>')
        arr.splice(randomI, 1)
        document.write(arr, '<br/>')

        // 074 猜数字
        function getRandom(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min
        }

        let num = getRandom(1, 10)
        console.log(num)

        while (true) {
            // 用户输入一个数字
            let innum = +prompt('请输入一个1-10之间的数字')
            // 判断用户输入的数字和随机数是否相等
            if (innum === num) {
                alert('恭喜你猜对了')
                break
            } else if (innum < num){
                alert('猜小了')
            } else if (innum > num){
                alert('猜大了')
            }
        }


    // 随机颜色
    function gerRandomColor(flag = true) {
        if (flag) {
            return '#' + Math.random().toString(16).slice(2, 8)
        } else {
            let r = Math.floor(Math.random() * 256)
            let g = Math.floor(Math.random() * 256)
            let b = Math.floor(Math.random() * 256)
            return `rgb(${r},${g},${b})`
        }
    }
    console.log(gerRandomColor(true))
    console.log(gerRandomColor(false))
    </script>

</html>
