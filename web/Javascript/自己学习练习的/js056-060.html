    <script>
        // 如果在函数内，一个变量没有声明，但是使用了，这就是全局变量了。极度不建议这样做
        function test() {
            a = 10;
        }
        test()
        console.log(a)
        // 10
        // 10

        // 严格模式
        // 'use strict';
        // function test() {
        //     a = 10;
        //     console.log(a);
        //  
        //    }


        // 匿名函数
        // 函数表达式。必须先声明，然后在调用。但是具名函数可以写在任何位置，可以在之后，也可以在之前。
        let test2 = function () {
            console.log('I am a function')
        }
        test2(); // 多个匿名函数之间必须用‘;’号隔开

        // // 使用场景
        // // 但这个是比较老一点的写法了
        // let btn = document.querySelector('button');
        // btn.onclick = function () {
        //     console.log('I am clicked')
        // }
        // // 这个是目前的
        // let btn2 = document.querySelector('button');
        // btn2.addEventListener('click', function () {
        //     console.log('I am clicked')
        // })

        // 立即执行函数, 防止变量污染
        // 多个匿名函数之间必须用‘;’号隔开
        (function (x, y) {
            console.log(`立即执行函数 x + y = ${x + y}`)
        }) (3, 7)

        
    </script>
</html>
