<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
    <script>
        // 以后声明不要用var 只用let
        let uname = prompt("Please input your name")
        let age = prompt("Please input your age")
        let gender = prompt("Please input your gender")
        document.write("Hello, " + uname + ", you are " + age + " years old, and your gender is " + gender + ".")

        //数组
        let arr = ["a", "b", "c", "d", "e"]
        console.log(arr)

        //常量
        const  G = 9.8
        console.log(G)

        //数据类型
        // 基本数据类型只有五个 number string boolean undefine null
        //引用数据类型 object array function

        //js中各种算术运算符
        // + - * / % 
        console.log(1+1)
        console.log(1-1)
        console.log(1*1)
        console.log(1/1)
        console.log(1%1)

        //NaN 代表一个计算错误
        console.log("teacher" - 2)
        console.log(NaN + 2) //NaN，任何对NaN的运算结果都是NaN

        //拼接，只有有一个字符串，拼起来就全都是字符串
        let age2 = 18
        console.log("I am " + age2 + " years old.")
    </script>
</html>
