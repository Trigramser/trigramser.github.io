<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
    <script>
        // 模板字符串，外面用`` 里面用${变量名}
        let age = 18
        document.write(`我的年龄是${age}岁`)
        //boolean类型
        let True = true
        let False = false
        console.log(`This is ${True}`)
        console.log(`This is ${False}`)

        //未定义
        let undef
        console.log(`This is ${undef}`)

        // null 空值
        let nu = null
        console.log(`This is ${nu}`)

        // undefine 与 null 运算有区别
        console.log(`This is undefine + 1: ${undef + 1}`)
        console.log(`This is null + 1: ${nu + 1}`)

        //test data type
        let num = 10
        console.log(`This num type  is ${typeof num}`)
        let str1 =  "10"
        console.log(`This str1 type  is ${typeof str1}`)
        console.log(`This undef is  ${typeof undef}`)
        console.log(`This nu is  ${typeof nu}`)

        // prompt 表单 单选框 复选框，取过来的数值都是string类型
        let age_prompt = prompt("请输入年龄")
        console.log(`This age is ${age_prompt} and type is ${typeof age_prompt}`)

        // 数据转换
        // 隐式数据转换
        console.log(`This is ${1 + age_prompt}. 1 + age_prompt: ${typeof (1+age_prompt)}`) // 出了+号在运算时不进行，其余均进行隐式转换
        console.log(`This is ${1 - age_prompt}. 1 - age_prompt: ${typeof (1-age_prompt)}`)
        console.log(`This is ${age_prompt * 2}. age_prompt * 2: ${typeof (age_prompt*2)}`)
        console.log(`This is ${1 / age_prompt}. 1 / age_prompt: ${typeof (1/age_prompt)}`)
        console.log(`This is ${age_prompt % 3}. age_prompt % 3: ${typeof (age_prompt%3)}`)
        console.log(`This is ${+age_prompt}. +age_prompt: ${typeof +age_prompt}`)

        // 显式数据转换
        console.log(`This is ${Number(age_prompt)}. Number(age_prompt): ${typeof Number(age_prompt)}`)
        console.log(`Number("tryit"): ${typeof Number("tryit")}`) // Number("tryit") 这种会变成NaN，NaN是数字类型
        console.log(Number('pink'))
        console.log(typeof NaN) // NaN是数字类型

        //parseInt() 只能转换整数，小数点后面的会去掉
        //parseFloat() 可以转换小数
        console.log(`This is ${parseInt(age_prompt)}. parseInt(age_prompt): ${typeof parseInt(age_prompt)}`)

        //赋值运算符
        // = += -= *= /= %=

    </script>
</html>
