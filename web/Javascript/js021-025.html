<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
<script>
    let num = 1
    let num_1 = 1
    let i  = 1
    console.log(`num++: ${num++}`) // 1 3
    console.log(`++num_1: ${++num_1}`) // 1 3
    console.log(`i++ + ++i + i: ${i++ + ++i + i}`) 

    // 比较运算符
    // === 数值和类型是否全部相等
    // !== 是否全部不相等
    console.log(1 == '1') // true
    console.log(1 === '1') // false 开发中强烈推荐
    console.log(1 != '1') // false
    console.log(1 !== '1') // true 开发中强烈推荐
    // 字符串比较是根据ASCII码表比较的
    console.log(1 < '1') // false 隐式转换 转换成了数字

    // 逻辑运算符
    // && 逻辑与
    // || 逻辑或
    // ! 逻辑非
    console.log(`==========================`)
    console.log(3>2 && 2>1 && 0 > -1) // true
    console.log(3>2 && 2>1 && 0) // 0
    console.log(3>2 && 2>1 || 0) // true
    console.log(3>2 && 2>1 || 1) // true
    console.log(3 && 2 && 4) // 4
    console.log(1 || 2) // 1
    console.log(!1) // false

    // 分支语句
    // 数字中只有0为假，其余都为真包括小数如0.1
    console.log(`==========================`)
    console.log(1 ? 'true' : 'false') // true
    if (+prompt("请输入您的分数：") > 600) {
        console.log('您已被录取')
    }
    else 
    {
        console.log('您未被录取')
    }
</script>
</html>
